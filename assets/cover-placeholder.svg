<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 225" width="400" height="225">
  <defs>
    <radialGradient id="ph-bg" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#141428"/>
      <stop offset="100%" stop-color="#0f0f1a"/>
    </radialGradient>
    <filter id="ph-glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="225" fill="url(#ph-bg)"/>

  <!-- Grid pattern (subtle) -->
  <pattern id="grid-pat" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-width="0.3" opacity="0.08"/>
  </pattern>
  <rect width="400" height="225" fill="url(#grid-pat)"/>

  <!-- Decorative corner accents -->
  <path d="M0,0 L30,0 L30,3 L3,3 L3,30 L0,30 Z" fill="#00d4ff" opacity="0.4"/>
  <path d="M400,0 L370,0 L370,3 L397,3 L397,30 L400,30 Z" fill="#00d4ff" opacity="0.4"/>
  <path d="M0,225 L30,225 L30,222 L3,222 L3,195 L0,195 Z" fill="#00d4ff" opacity="0.4"/>
  <path d="M400,225 L370,225 L370,222 L397,222 L397,195 L400,195 Z" fill="#00d4ff" opacity="0.4"/>

  <!-- Game controller icon (center) -->
  <g transform="translate(200, 100)" filter="url(#ph-glow)">
    <!-- Controller body -->
    <rect x="-55" y="-28" width="110" height="56" rx="28" fill="#1c1c38" stroke="#00d4ff" stroke-width="2.5"/>

    <!-- Left grip -->
    <rect x="-65" y="10" width="30" height="38" rx="15" fill="#1c1c38" stroke="#00d4ff" stroke-width="2"/>

    <!-- Right grip -->
    <rect x="35" y="10" width="30" height="38" rx="15" fill="#1c1c38" stroke="#00d4ff" stroke-width="2"/>

    <!-- D-Pad (left side) -->
    <rect x="-48" y="-10" width="10" height="28" rx="3" fill="#00d4ff" opacity="0.8"/>
    <rect x="-58" y="0" width="30" height="10" rx="3" fill="#00d4ff" opacity="0.8"/>

    <!-- Action buttons (right side) -->
    <circle cx="38" cy="-8" r="7" fill="#b44aff" opacity="0.9"/>
    <circle cx="48" cy="4" r="7" fill="#00d4ff" opacity="0.9"/>
    <circle cx="28" cy="4" r="7" fill="#7fff00" opacity="0.9"/>
    <circle cx="38" cy="16" r="7" fill="#ff4466" opacity="0.9"/>

    <!-- Button labels -->
    <text x="38" y="-5" font-family="Arial, sans-serif" font-size="8" font-weight="bold" fill="#ffffff" text-anchor="middle">△</text>
    <text x="48" y="7" font-family="Arial, sans-serif" font-size="8" font-weight="bold" fill="#ffffff" text-anchor="middle">○</text>
    <text x="28" y="7" font-family="Arial, sans-serif" font-size="8" font-weight="bold" fill="#ffffff" text-anchor="middle">□</text>
    <text x="38" y="19" font-family="Arial, sans-serif" font-size="8" font-weight="bold" fill="#ffffff" text-anchor="middle">✕</text>

    <!-- Center buttons -->
    <rect x="-8" y="-6" width="16" height="10" rx="5" fill="#2a2a50" stroke="#444466" stroke-width="1"/>
    <rect x="-8" y="8" width="16" height="10" rx="5" fill="#2a2a50" stroke="#444466" stroke-width="1"/>
    <circle cx="-3" cy="-1" r="2.5" fill="#888899"/>
    <circle cx="3" cy="-1" r="2.5" fill="#888899"/>
    <text x="0" y="15" font-family="Arial, sans-serif" font-size="6" fill="#888899" text-anchor="middle">START</text>
  </g>

  <!-- Decorative particles -->
  <circle cx="40" cy="40" r="3" fill="#00d4ff" opacity="0.4"/>
  <circle cx="360" cy="40" r="3" fill="#b44aff" opacity="0.4"/>
  <circle cx="40" cy="185" r="3" fill="#7fff00" opacity="0.4"/>
  <circle cx="360" cy="185" r="3" fill="#00d4ff" opacity="0.4"/>

  <!-- Title text -->
  <text x="200" y="172" font-family="'Fredoka One', 'Arial Rounded MT Bold', Arial, sans-serif" font-size="16" font-weight="bold" fill="#888899" text-anchor="middle" letter-spacing="2">
    EM BREVE
  </text>

  <!-- Subtitle -->
  <text x="200" y="200" font-family="Arial, sans-serif" font-size="13" fill="#555570" text-anchor="middle" letter-spacing="1">
    Novo Jogo
  </text>
  <text x="200" y="216" font-family="Arial, sans-serif" font-size="10" fill="#444460" text-anchor="middle" letter-spacing="1">
    catálogo de jogos infantil
  </text>

  <!-- Bottom accent line -->
  <rect x="120" y="222" width="160" height="1.5" fill="#00d4ff" opacity="0.25" rx="1"/>
</svg>
