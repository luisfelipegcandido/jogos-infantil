<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="presentation" aria-hidden="true">
  <defs>
    <radialGradient id="planetIconGrad" cx="38%" cy="33%" r="60%">
      <stop offset="0%" stop-color="#33bbff"/>
      <stop offset="60%" stop-color="#00aaff"/>
      <stop offset="100%" stop-color="#0077cc"/>
    </radialGradient>
    <linearGradient id="planetRingGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#00d4ff" stop-opacity="0.1"/>
      <stop offset="25%"  stop-color="#00d4ff" stop-opacity="0.9"/>
      <stop offset="75%"  stop-color="#33bbff" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#00d4ff" stop-opacity="0.1"/>
    </linearGradient>
    <filter id="planetGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Ring back half -->
  <ellipse cx="32" cy="34" rx="30" ry="7" fill="none" stroke="url(#planetRingGrad)" stroke-width="4" opacity="0.35"/>

  <!-- Planet body -->
  <circle cx="32" cy="30" r="20" fill="url(#planetIconGrad)" filter="url(#planetGlow)"/>

  <!-- Surface detail bands -->
  <ellipse cx="32" cy="26" rx="15" ry="4"  fill="none" stroke="#33bbff" stroke-width="1.5" opacity="0.4"/>
  <ellipse cx="32" cy="33" rx="18" ry="5"  fill="none" stroke="#0077cc" stroke-width="1"   opacity="0.3"/>

  <!-- Small spot / crater -->
  <circle cx="24" cy="26" r="4" fill="#0077cc" opacity="0.4"/>
  <circle cx="37" cy="34" r="3" fill="#33bbff" opacity="0.25"/>

  <!-- Ring front half arc -->
  <path d="M 2 34 Q 32 44 62 34" fill="none" stroke="#00d4ff" stroke-width="4" stroke-linecap="round" opacity="0.8"/>

  <!-- Highlight glint -->
  <circle cx="26" cy="24" r="3.5" fill="#ffffff" opacity="0.25"/>
</svg>
