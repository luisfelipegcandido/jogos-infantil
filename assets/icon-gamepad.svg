<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="presentation" aria-hidden="true">
  <defs>
    <radialGradient id="gamepadGrad" cx="40%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#cc44ff"/>
      <stop offset="100%" stop-color="#7700cc"/>
    </radialGradient>
    <filter id="gamepadGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Controller body -->
  <path
    d="M 8 24 Q 6 18 12 16 L 24 14 Q 28 12 32 12 Q 36 12 40 14 L 52 16 Q 58 18 56 24 L 52 44 Q 50 52 44 52 Q 40 52 38 48 L 35 44 L 29 44 L 26 48 Q 24 52 20 52 Q 14 52 12 44 Z"
    fill="url(#gamepadGrad)"
    filter="url(#gamepadGlow)"
  />

  <!-- Left directional pad — vertical bar -->
  <rect x="16" y="24" width="6" height="16" rx="2" fill="#0f0f1a" opacity="0.7"/>
  <!-- Left directional pad — horizontal bar -->
  <rect x="12" y="28" width="14" height="6" rx="2" fill="#0f0f1a" opacity="0.7"/>

  <!-- Right buttons group -->
  <!-- Top button (blue) -->
  <circle cx="44" cy="26" r="4" fill="#00d4ff" opacity="0.9"/>
  <!-- Left button (green) -->
  <circle cx="38" cy="32" r="4" fill="#7fff00" opacity="0.9"/>
  <!-- Right button (yellow) -->
  <circle cx="50" cy="32" r="4" fill="#ffaa00" opacity="0.9"/>
  <!-- Bottom button (red) -->
  <circle cx="44" cy="38" r="4" fill="#ff3355" opacity="0.9"/>

  <!-- Center options buttons -->
  <rect x="27" y="29" width="4" height="6" rx="2" fill="#e8e8f0" opacity="0.5"/>
  <rect x="33" y="29" width="4" height="6" rx="2" fill="#e8e8f0" opacity="0.5"/>

  <!-- Shoulder bumpers -->
  <path d="M 12 24 Q 10 18 18 17 L 24 16 Q 20 18 18 24 Z" fill="#cc44ff" opacity="0.6"/>
  <path d="M 52 24 Q 54 18 46 17 L 40 16 Q 44 18 46 24 Z" fill="#cc44ff" opacity="0.6"/>

  <!-- Body highlight -->
  <ellipse cx="32" cy="22" rx="14" ry="5" fill="#ffffff" opacity="0.12"/>
</svg>
