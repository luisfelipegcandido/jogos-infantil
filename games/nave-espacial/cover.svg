<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 225" width="400" height="225">
  <defs>
    <radialGradient id="bg-glow" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#1a0a2e"/>
      <stop offset="100%" stop-color="#0f0f1a"/>
    </radialGradient>
    <radialGradient id="planet-grad" cx="35%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#3a1a6e"/>
      <stop offset="100%" stop-color="#1a0840"/>
    </radialGradient>
    <filter id="glow-blue">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-engine">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="225" fill="url(#bg-glow)"/>

  <!-- Stars -->
  <circle cx="20" cy="15" r="1.2" fill="#ffffff" opacity="0.9"/>
  <circle cx="55" cy="40" r="0.8" fill="#ffffff" opacity="0.7"/>
  <circle cx="90" cy="12" r="1.5" fill="#00d4ff" opacity="0.8"/>
  <circle cx="140" cy="30" r="1" fill="#ffffff" opacity="0.6"/>
  <circle cx="180" cy="8" r="0.9" fill="#ffffff" opacity="0.8"/>
  <circle cx="230" cy="22" r="1.3" fill="#7fff00" opacity="0.7"/>
  <circle cx="270" cy="10" r="0.8" fill="#ffffff" opacity="0.9"/>
  <circle cx="310" cy="35" r="1.1" fill="#ffffff" opacity="0.6"/>
  <circle cx="350" cy="18" r="1.4" fill="#b44aff" opacity="0.8"/>
  <circle cx="380" cy="45" r="0.9" fill="#ffffff" opacity="0.7"/>
  <circle cx="15" cy="70" r="0.7" fill="#ffffff" opacity="0.5"/>
  <circle cx="65" cy="90" r="1" fill="#00d4ff" opacity="0.6"/>
  <circle cx="120" cy="75" r="0.8" fill="#ffffff" opacity="0.8"/>
  <circle cx="160" cy="55" r="1.2" fill="#ffffff" opacity="0.5"/>
  <circle cx="320" cy="60" r="0.9" fill="#ffffff" opacity="0.7"/>
  <circle cx="370" cy="80" r="1.1" fill="#7fff00" opacity="0.6"/>
  <circle cx="390" cy="120" r="0.8" fill="#ffffff" opacity="0.5"/>
  <circle cx="10" cy="160" r="1" fill="#ffffff" opacity="0.6"/>
  <circle cx="50" cy="180" r="0.7" fill="#00d4ff" opacity="0.7"/>
  <circle cx="100" cy="200" r="1.2" fill="#ffffff" opacity="0.5"/>
  <circle cx="340" cy="170" r="0.9" fill="#ffffff" opacity="0.6"/>
  <circle cx="385" cy="190" r="1" fill="#b44aff" opacity="0.7"/>

  <!-- Distant planet (top-right) -->
  <circle cx="330" cy="55" r="38" fill="url(#planet-grad)" opacity="0.7"/>
  <ellipse cx="330" cy="55" rx="55" ry="10" fill="none" stroke="#b44aff" stroke-width="2" opacity="0.5"/>

  <!-- Asteroid 1 (left side) -->
  <ellipse cx="70" cy="145" rx="18" ry="12" fill="#2a2240" stroke="#00d4ff" stroke-width="1" opacity="0.8"/>
  <line x1="62" y1="138" x2="75" y2="152" stroke="#1a1430" stroke-width="2"/>
  <line x1="73" y1="136" x2="68" y2="148" stroke="#1a1430" stroke-width="1.5"/>

  <!-- Asteroid 2 (bottom-right) -->
  <ellipse cx="345" cy="175" rx="14" ry="9" fill="#2a2240" stroke="#7fff00" stroke-width="1" opacity="0.7"/>

  <!-- Asteroid 3 (small, top-left) -->
  <ellipse cx="40" cy="95" rx="8" ry="5" fill="#1e1a30" stroke="#b44aff" stroke-width="0.8" opacity="0.6"/>

  <!-- Spaceship body -->
  <g transform="translate(185, 85) rotate(-15)" filter="url(#glow-blue)">
    <!-- Engine flame -->
    <ellipse cx="0" cy="52" rx="8" ry="18" fill="#ff8c00" opacity="0.9" filter="url(#glow-engine)"/>
    <ellipse cx="0" cy="58" rx="5" ry="12" fill="#ffff00" opacity="0.8"/>
    <ellipse cx="-10" cy="50" rx="5" ry="12" fill="#ff6600" opacity="0.7"/>
    <ellipse cx="10" cy="50" rx="5" ry="12" fill="#ff6600" opacity="0.7"/>

    <!-- Main fuselage -->
    <ellipse cx="0" cy="15" rx="16" ry="38" fill="#1e2040"/>
    <ellipse cx="0" cy="15" rx="16" ry="38" fill="none" stroke="#00d4ff" stroke-width="1.5"/>

    <!-- Nose cone -->
    <path d="M-16 -10 Q0 -52 16 -10 Z" fill="#00d4ff" opacity="0.9"/>

    <!-- Wings -->
    <path d="M-16 20 L-42 48 L-16 40 Z" fill="#b44aff" opacity="0.9"/>
    <path d="M16 20 L42 48 L16 40 Z" fill="#b44aff" opacity="0.9"/>
    <path d="M-16 20 L-42 48 L-16 40 Z" fill="none" stroke="#00d4ff" stroke-width="1"/>
    <path d="M16 20 L42 48 L16 40 Z" fill="none" stroke="#00d4ff" stroke-width="1"/>

    <!-- Cockpit window -->
    <circle cx="0" cy="5" r="9" fill="#0a1428" stroke="#00d4ff" stroke-width="1.5"/>
    <circle cx="0" cy="5" r="7" fill="#0d1f3c"/>
    <circle cx="-2" cy="3" r="3" fill="#00d4ff" opacity="0.5"/>

    <!-- Stripes -->
    <rect x="-16" y="22" width="32" height="3" fill="#00d4ff" opacity="0.4" rx="1"/>
    <rect x="-14" y="30" width="28" height="2" fill="#b44aff" opacity="0.4" rx="1"/>
  </g>

  <!-- Laser shot -->
  <rect x="182" y="60" width="3" height="20" fill="#7fff00" opacity="0.9" rx="1.5"/>
  <rect x="182" y="55" width="3" height="8" fill="#ffffff" opacity="0.7" rx="1.5"/>

  <!-- Title text -->
  <text x="200" y="198" font-family="'Fredoka One', 'Arial Rounded MT Bold', Arial, sans-serif" font-size="22" font-weight="bold" fill="#ffffff" text-anchor="middle" letter-spacing="1">
    NAVE ESPACIAL
  </text>
  <text x="200" y="215" font-family="Arial, sans-serif" font-size="11" fill="#00d4ff" text-anchor="middle" letter-spacing="2" opacity="0.9">
    DESTRUA ASTEROIDES · SALVE A GALÁXIA
  </text>

  <!-- Decorative bottom glow line -->
  <rect x="80" y="220" width="240" height="2" fill="#00d4ff" opacity="0.4" rx="1"/>
</svg>
