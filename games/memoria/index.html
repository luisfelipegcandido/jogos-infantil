<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Jogo da Memória — Encontre todos os pares e treine sua memória! Catálogo de Jogos Infantil." />
  <title>Jogo da Memória — Catálogo de Jogos Infantil</title>
  <!-- Global styles (shared template) -->
  <link rel="stylesheet" href="../../css/style.css" />
  <!-- Game-specific styles -->
  <link rel="stylesheet" href="style.css" />
</head>
<body class="game-page">

  <!-- =====================================================================
       Top bar — back button + game title (shared template)
       ===================================================================== -->
  <div class="game-page__topbar" role="banner">
    <a
      class="game-page__back-btn"
      href="../../index.html#catalogo"
      aria-label="Voltar ao Catálogo"
    >
      <span aria-hidden="true">←</span>
      Voltar ao Catálogo
    </a>
    <span class="game-page__topbar-title" aria-hidden="true">Jogo da Memória</span>
  </div>

  <!-- =====================================================================
       Game header — title / category / description (shared template)
       ===================================================================== -->
  <header class="game-page__header">
    <span class="game-page__category" aria-label="Categoria: Memória">
      <span aria-hidden="true">🧠</span>
      Memória
    </span>
    <h1 class="game-page__title">Jogo da Memória</h1>
    <p class="game-page__description">Encontre todos os pares e treine sua memória!</p>
  </header>

  <!-- =====================================================================
       Loading indicator (shared template — visible until game is ready)
       ===================================================================== -->
  <div
    class="game-page__loading"
    id="game-loading"
    role="status"
    aria-label="Carregando jogo"
    aria-live="polite"
  >
    <div class="loading-spinner" aria-hidden="true">
      <span class="loading-spinner__dot"></span>
      <span class="loading-spinner__dot"></span>
      <span class="loading-spinner__dot"></span>
    </div>
    <span>Carregando…</span>
  </div>

  <!-- =====================================================================
       Main game area
       ===================================================================== -->
  <main class="game-page__container" aria-label="Área do jogo da Memória">

    <!-- Difficulty selection screen -->
    <div
      class="game-overlay"
      id="overlay-difficulty"
      role="dialog"
      aria-modal="true"
      aria-label="Escolha a dificuldade"
    >
      <h2 class="overlay-title">Jogo da Memória</h2>
      <p class="overlay-subtitle">Escolha a dificuldade para começar:</p>
      <div class="difficulty-buttons">
        <button class="btn-difficulty" id="btn-easy" aria-label="Jogar no modo fácil — 8 pares">
          <span aria-hidden="true">😊</span>
          Fácil
          <small>8 pares</small>
        </button>
        <button class="btn-difficulty btn-difficulty--hard" id="btn-hard" aria-label="Jogar no modo difícil — 16 pares">
          <span aria-hidden="true">🔥</span>
          Difícil
          <small>16 pares</small>
        </button>
      </div>
    </div>

    <!-- Victory overlay -->
    <div
      class="game-overlay hidden"
      id="overlay-victory"
      role="alertdialog"
      aria-modal="true"
      aria-label="Vitória"
    >
      <h2 class="overlay-title overlay-title--victory">🏆 Parabéns!</h2>
      <p class="overlay-subtitle">Você encontrou todos os pares!</p>
      <p class="overlay-score">
        Tentativas: <strong id="final-attempts">0</strong>
      </p>
      <div class="victory-buttons">
        <button class="btn-restart" id="btn-restart" autofocus>
          Jogar Novamente
        </button>
        <button class="btn-change-difficulty" id="btn-change-difficulty">
          Mudar Dificuldade
        </button>
      </div>
    </div>

    <!-- Game board area -->
    <div class="memory-game" id="memory-game" aria-label="Tabuleiro do jogo da memória">

      <!-- HUD: attempts counter + difficulty badge -->
      <div class="memory-hud" aria-live="polite" aria-atomic="true">
        <div class="hud-item">
          <span class="hud-label">Tentativas</span>
          <span class="hud-value" id="hud-attempts">0</span>
        </div>
        <div class="hud-item">
          <span class="hud-label">Pares</span>
          <span class="hud-value" id="hud-pairs">0 / 0</span>
        </div>
        <div class="hud-item">
          <span class="hud-label">Nível</span>
          <span class="hud-value" id="hud-difficulty">—</span>
        </div>
      </div>

      <!-- Card grid — populated by game.js -->
      <div
        class="memory-board"
        id="memory-board"
        role="list"
        aria-label="Cartas do jogo"
      ></div>

    </div><!-- /.memory-game -->

  </main><!-- /.game-page__container -->

  <!-- =====================================================================
       Footer back link (shared template)
       ===================================================================== -->
  <div class="game-page__footer">
    <a
      class="btn btn--secondary"
      href="../../index.html#catalogo"
      aria-label="Voltar ao Catálogo de Jogos"
    >
      <span aria-hidden="true">←</span>
      Voltar ao Catálogo
    </a>
  </div>

  <script src="game.js" defer></script>
</body>
</html>
