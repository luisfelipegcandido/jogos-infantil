<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 225" width="400" height="225">
  <defs>
    <radialGradient id="mem-bg" cx="50%" cy="45%" r="70%">
      <stop offset="0%" stop-color="#0d1a2e"/>
      <stop offset="100%" stop-color="#0f0f1a"/>
    </radialGradient>
    <filter id="card-shadow">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
    <filter id="glow-green">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="225" fill="url(#mem-bg)"/>

  <!-- Decorative particles -->
  <circle cx="25" cy="20" r="1.5" fill="#b44aff" opacity="0.7"/>
  <circle cx="80" cy="50" r="1" fill="#00d4ff" opacity="0.6"/>
  <circle cx="360" cy="25" r="1.2" fill="#7fff00" opacity="0.7"/>
  <circle cx="390" cy="60" r="0.9" fill="#ffffff" opacity="0.5"/>
  <circle cx="15" cy="180" r="1.1" fill="#00d4ff" opacity="0.6"/>
  <circle cx="385" cy="190" r="1.3" fill="#b44aff" opacity="0.7"/>

  <!-- Brain icon (left side) -->
  <g transform="translate(58, 112)" opacity="0.85">
    <!-- Brain outline - left hemisphere -->
    <path d="M0,0 C-8,-28 -30,-32 -32,-18 C-38,-18 -42,-10 -36,-4 C-40,4 -35,14 -26,14 C-22,22 -12,24 -4,20 C0,26 8,26 12,20 C20,24 30,22 34,14 C43,14 48,4 44,-4 C50,-10 46,-18 40,-18 C38,-32 16,-28 8,-4 C6,-12 2,-14 0,0 Z" fill="none" stroke="#b44aff" stroke-width="2.5"/>
    <!-- Brain folds -->
    <path d="M0,0 C2,-8 6,-14 8,-20" fill="none" stroke="#b44aff" stroke-width="1.5" opacity="0.6"/>
    <path d="M-10,6 C-14,0 -16,-6 -18,-12" fill="none" stroke="#b44aff" stroke-width="1.5" opacity="0.6"/>
    <path d="M14,8 C18,2 20,-4 22,-10" fill="none" stroke="#b44aff" stroke-width="1.5" opacity="0.6"/>
    <path d="M-20,14 C-18,10 -16,6 -14,2" fill="none" stroke="#b44aff" stroke-width="1.5" opacity="0.6"/>
    <path d="M24,14 C22,10 20,6 18,2" fill="none" stroke="#b44aff" stroke-width="1.5" opacity="0.6"/>
    <!-- Center divider -->
    <line x1="0" y1="-30" x2="0" y2="18" stroke="#b44aff" stroke-width="1.5" opacity="0.5" stroke-dasharray="4,3"/>
    <!-- Glow dots -->
    <circle cx="-20" cy="-10" r="3" fill="#b44aff" opacity="0.5"/>
    <circle cx="20" cy="-10" r="3" fill="#b44aff" opacity="0.5"/>
    <circle cx="0" cy="10" r="2.5" fill="#b44aff" opacity="0.5"/>
  </g>

  <!-- Memory cards grid (3x3 arrangement, some face-up) -->
  <!-- Card helper: x, y = top-left corner; w=52, h=68 -->

  <!-- Row 1 -->
  <!-- Card (0,0) face-up - star -->
  <g filter="url(#card-shadow)">
    <rect x="155" y="28" width="52" height="68" rx="7" fill="#1c2040" stroke="#00d4ff" stroke-width="1.5"/>
    <text x="181" y="72" font-size="28" text-anchor="middle">⭐</text>
  </g>
  <!-- Card (1,0) face-up - rocket -->
  <g filter="url(#card-shadow)">
    <rect x="215" y="28" width="52" height="68" rx="7" fill="#1c2040" stroke="#7fff00" stroke-width="1.5"/>
    <text x="241" y="72" font-size="28" text-anchor="middle">🚀</text>
  </g>
  <!-- Card (2,0) face-down -->
  <g filter="url(#card-shadow)">
    <rect x="275" y="28" width="52" height="68" rx="7" fill="#12122a" stroke="#b44aff" stroke-width="1.5"/>
    <rect x="282" y="35" width="38" height="54" rx="5" fill="#1a1a35"/>
    <!-- Card back pattern -->
    <circle cx="301" cy="62" r="12" fill="none" stroke="#b44aff" stroke-width="1.5" opacity="0.7"/>
    <circle cx="301" cy="62" r="6" fill="#b44aff" opacity="0.4"/>
  </g>

  <!-- Row 2 -->
  <!-- Card (0,1) face-down -->
  <g filter="url(#card-shadow)">
    <rect x="155" y="104" width="52" height="68" rx="7" fill="#12122a" stroke="#b44aff" stroke-width="1.5"/>
    <rect x="162" y="111" width="38" height="54" rx="5" fill="#1a1a35"/>
    <circle cx="181" cy="138" r="12" fill="none" stroke="#b44aff" stroke-width="1.5" opacity="0.7"/>
    <circle cx="181" cy="138" r="6" fill="#b44aff" opacity="0.4"/>
  </g>
  <!-- Card (1,1) face-up - matched pair star (glowing) -->
  <g filter="url(#glow-green)">
    <rect x="215" y="104" width="52" height="68" rx="7" fill="#0d2a1a" stroke="#7fff00" stroke-width="2"/>
    <text x="241" y="148" font-size="28" text-anchor="middle">⭐</text>
  </g>
  <!-- Card (2,1) face-up - lightning -->
  <g filter="url(#card-shadow)">
    <rect x="275" y="104" width="52" height="68" rx="7" fill="#1c2040" stroke="#00d4ff" stroke-width="1.5"/>
    <text x="301" y="148" font-size="28" text-anchor="middle">⚡</text>
  </g>

  <!-- Row 3 -->
  <!-- Card (0,2) face-up - matched rocket (glowing) -->
  <g filter="url(#glow-green)">
    <rect x="155" y="180" width="52" height="38" rx="7" fill="#0d2a1a" stroke="#7fff00" stroke-width="2"/>
    <text x="181" y="206" font-size="24" text-anchor="middle">🚀</text>
  </g>
  <!-- Card (1,2) face-down -->
  <g filter="url(#card-shadow)">
    <rect x="215" y="180" width="52" height="38" rx="7" fill="#12122a" stroke="#b44aff" stroke-width="1.5"/>
    <circle cx="241" cy="199" r="9" fill="none" stroke="#b44aff" stroke-width="1.5" opacity="0.7"/>
  </g>
  <!-- Card (2,2) face-down -->
  <g filter="url(#card-shadow)">
    <rect x="275" y="180" width="52" height="38" rx="7" fill="#12122a" stroke="#b44aff" stroke-width="1.5"/>
    <circle cx="301" cy="199" r="9" fill="none" stroke="#b44aff" stroke-width="1.5" opacity="0.7"/>
  </g>

  <!-- Title text -->
  <text x="115" y="198" font-family="'Fredoka One', 'Arial Rounded MT Bold', Arial, sans-serif" font-size="20" font-weight="bold" fill="#ffffff" text-anchor="middle" letter-spacing="0.5">
    JOGO DA
  </text>
  <text x="115" y="215" font-family="'Fredoka One', 'Arial Rounded MT Bold', Arial, sans-serif" font-size="20" font-weight="bold" fill="#b44aff" text-anchor="middle" letter-spacing="0.5">
    MEMÓRIA
  </text>

  <!-- Score indicator -->
  <rect x="20" y="60" width="76" height="28" rx="6" fill="#0d2a1a" stroke="#7fff00" stroke-width="1.5"/>
  <text x="58" y="79" font-family="Arial, sans-serif" font-size="12" fill="#7fff00" text-anchor="middle" font-weight="bold">PARES: 2/8</text>

  <!-- Bottom glow line -->
  <rect x="80" y="220" width="240" height="2" fill="#b44aff" opacity="0.4" rx="1"/>
</svg>
