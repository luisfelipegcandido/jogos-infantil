<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 225" width="400" height="225">
  <defs>
    <radialGradient id="puz-bg" cx="50%" cy="50%" r="65%">
      <stop offset="0%" stop-color="#0f1a0f"/>
      <stop offset="100%" stop-color="#0f0f1a"/>
    </radialGradient>
    <filter id="tile-glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="tile-shadow">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-color="#000000" flood-opacity="0.6"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="225" fill="url(#puz-bg)"/>

  <!-- Background dots/particles -->
  <circle cx="20" cy="18" r="1.3" fill="#7fff00" opacity="0.5"/>
  <circle cx="60" cy="45" r="0.9" fill="#00d4ff" opacity="0.6"/>
  <circle cx="360" cy="20" r="1.1" fill="#b44aff" opacity="0.5"/>
  <circle cx="385" cy="55" r="1" fill="#ffffff" opacity="0.5"/>
  <circle cx="15" cy="160" r="1.2" fill="#00d4ff" opacity="0.5"/>
  <circle cx="390" cy="170" r="0.9" fill="#7fff00" opacity="0.5"/>

  <!-- Decorative grid lines (faint background) -->
  <line x1="0" y1="75" x2="400" y2="75" stroke="#ffffff" stroke-width="0.4" opacity="0.08"/>
  <line x1="0" y1="150" x2="400" y2="150" stroke="#ffffff" stroke-width="0.4" opacity="0.08"/>
  <line x1="133" y1="0" x2="133" y2="225" stroke="#ffffff" stroke-width="0.4" opacity="0.08"/>
  <line x1="267" y1="0" x2="267" y2="225" stroke="#ffffff" stroke-width="0.4" opacity="0.08"/>

  <!-- 3×3 sliding puzzle grid (centered) -->
  <!-- Tile size: 62×58, gap: 6, grid total: 202×192 -->
  <!-- Grid origin: x=99, y=16 -->

  <!-- Tile 1 (position 0,0) -->
  <g filter="url(#tile-shadow)">
    <rect x="99" y="16" width="62" height="58" rx="8" fill="#1c2040" stroke="#00d4ff" stroke-width="2"/>
    <text x="130" y="54" font-family="'Fredoka One', 'Arial Rounded MT Bold', Arial, sans-serif" font-size="28" font-weight="bold" fill="#00d4ff" text-anchor="middle">1</text>
  </g>

  <!-- Tile 2 (position 1,0) -->
  <g filter="url(#tile-shadow)">
    <rect x="169" y="16" width="62" height="58" rx="8" fill="#1c2040" stroke="#00d4ff" stroke-width="2"/>
    <text x="200" y="54" font-family="'Fredoka One', 'Arial Rounded MT Bold', Arial, sans-serif" font-size="28" font-weight="bold" fill="#00d4ff" text-anchor="middle">2</text>
  </g>

  <!-- Tile 3 (position 2,0) -->
  <g filter="url(#tile-shadow)">
    <rect x="239" y="16" width="62" height="58" rx="8" fill="#1c2040" stroke="#00d4ff" stroke-width="2"/>
    <text x="270" y="54" font-family="'Fredoka One', 'Arial Rounded MT Bold', Arial, sans-serif" font-size="28" font-weight="bold" fill="#00d4ff" text-anchor="middle">3</text>
  </g>

  <!-- Tile 4 (position 0,1) -->
  <g filter="url(#tile-shadow)">
    <rect x="99" y="82" width="62" height="58" rx="8" fill="#1c2040" stroke="#b44aff" stroke-width="2"/>
    <text x="130" y="120" font-family="'Fredoka One', 'Arial Rounded MT Bold', Arial, sans-serif" font-size="28" font-weight="bold" fill="#b44aff" text-anchor="middle">4</text>
  </g>

  <!-- Tile 5 (position 1,1) — highlighted/active tile being moved -->
  <g filter="url(#tile-glow)">
    <rect x="169" y="82" width="62" height="58" rx="8" fill="#0d2a1a" stroke="#7fff00" stroke-width="2.5"/>
    <text x="200" y="120" font-family="'Fredoka One', 'Arial Rounded MT Bold', Arial, sans-serif" font-size="28" font-weight="bold" fill="#7fff00" text-anchor="middle">5</text>
  </g>

  <!-- Tile 7 (position 2,1) — displaced, showing out of position -->
  <g filter="url(#tile-shadow)" transform="translate(4, -4)">
    <rect x="239" y="82" width="62" height="58" rx="8" fill="#1c2040" stroke="#b44aff" stroke-width="2"/>
    <text x="270" y="120" font-family="'Fredoka One', 'Arial Rounded MT Bold', Arial, sans-serif" font-size="28" font-weight="bold" fill="#b44aff" text-anchor="middle">7</text>
  </g>

  <!-- Tile 6 (position 0,2) -->
  <g filter="url(#tile-shadow)">
    <rect x="99" y="148" width="62" height="40" rx="8" fill="#1c2040" stroke="#00d4ff" stroke-width="2"/>
    <text x="130" y="175" font-family="'Fredoka One', 'Arial Rounded MT Bold', Arial, sans-serif" font-size="24" font-weight="bold" fill="#00d4ff" text-anchor="middle">6</text>
  </g>

  <!-- EMPTY SPACE (position 1,2) -->
  <rect x="169" y="148" width="62" height="40" rx="8" fill="#0a0a18" stroke="#444466" stroke-width="1.5" stroke-dasharray="6,4"/>

  <!-- Tile 8 (position 2,2) -->
  <g filter="url(#tile-shadow)">
    <rect x="239" y="148" width="62" height="40" rx="8" fill="#1c2040" stroke="#b44aff" stroke-width="2"/>
    <text x="270" y="175" font-family="'Fredoka One', 'Arial Rounded MT Bold', Arial, sans-serif" font-size="24" font-weight="bold" fill="#b44aff" text-anchor="middle">8</text>
  </g>

  <!-- Movement arrow (pointing toward empty space) -->
  <g transform="translate(200, 153)" opacity="0.7">
    <path d="M-10,0 L0,-12 L10,0 Z" fill="#7fff00"/>
    <rect x="-3" y="0" width="6" height="10" fill="#7fff00" rx="1"/>
  </g>

  <!-- Title text -->
  <text x="200" y="203" font-family="'Fredoka One', 'Arial Rounded MT Bold', Arial, sans-serif" font-size="18" font-weight="bold" fill="#ffffff" text-anchor="middle" letter-spacing="0.5">
    QUEBRA-CABEÇA
  </text>
  <text x="200" y="219" font-family="'Fredoka One', 'Arial Rounded MT Bold', Arial, sans-serif" font-size="14" font-weight="bold" fill="#7fff00" text-anchor="middle" letter-spacing="1">
    DESLIZANTE
  </text>

  <!-- Bottom glow line -->
  <rect x="80" y="222" width="240" height="2" fill="#7fff00" opacity="0.4" rx="1"/>
</svg>
